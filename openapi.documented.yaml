openapi: 3.1.0
info:
  title: Nuntly REST API 1.x
  version: 1.0.0-alpha.20
  description: Nuntly REST API definition
  termsOfService: https://nuntly.com/legal/terms-of-service
  contact:
    name: Nuntly Support
    url: https://nuntly.com/docs
    email: support@nuntly.com
servers:
  - description: Nuntly API endpoint
    url: https://api.nuntly.com
externalDocs:
  description: Nuntly API Documentation
  url: https://nuntly.com/docs
security:
  - bearerAuth: []
tags:
  - name: API Keys
    description: Create and revoke API keys used to authenticate requests to the Nuntly API.
  - name: Agents
    description: Read and write persistent state for an AI agent, optionally scoped to a specific inbox or thread.
  - name: Domains
    description: Add and verify sending and receiving domains. Manage DKIM records, SPF configuration, and enable inbound email routing.
  - name: Emails
    description: Send transactional emails, retrieve sending history, and track delivery status per message.
  - name: Inboxes
    description: Create email inboxes at a specific address on a verified receiving domain. Assign inboxes to namespaces or AI agents.
  - name: Messages
    description: Access received messages, download attachments, and send replies or forwards from an inbox.
  - name: Namespaces
    description: Isolate inboxes by tenant, client, or agent using namespaces. Use an external ID to map namespaces to your own data model.
  - name: Organizations
    description: Manage your organization profile, team members, and account-level settings.
  - name: Threads
    description: Browse email conversations grouped by subject. Mark threads as read or spam, and assign them to an agent.
  - name: Webhooks
    description: Register HTTP endpoints to receive real-time delivery events such as bounces, opens, and clicks.
  - name: Webhooks Events
    description: Inspect webhook event history and replay failed deliveries for debugging or recovery.
  - name: Webhooks Hook
    description: Endpoint your server implements to receive webhook events. Not a Nuntly API endpoint - this documents the shape your handler must accept.
paths:
  /agents/{agentId}/memory:
    get:
      summary: Retrieve Agent Memory
      description: Retrieve the memory for an AI agent.
      operationId: retrieve-agent-memory
      tags:
        - Agents
      parameters:
        - name: agentId
          in: path
          required: true
          description: The agent identifier.
          schema:
            type: string
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AgentMemory"
                required:
                  - data
                additionalProperties: false
        "500":
          description: An error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X GET 'https://api.nuntly.com/agents/aB3dE7fG/memory' \
              -H 'Authorization: Bearer apk_xxx'
        - lang: JavaScript
          source: |-
            import { Nuntly } from '@nuntly/sdk';

            const client = new Nuntly({
              apiKey: process.env['NUNTLY_API_KEY'],
            });

            const response = await client.agents.memory.retrieve('aB3dE7fG');
        - lang: Java
          source: |-
            import com.nuntly.sdk.Nuntly;
            import com.nuntly.sdk.ClientOptions;

            var nuntly = Nuntly.create(ClientOptions.builder()
                .apiKey(System.getenv("NUNTLY_API_KEY"))
                .build());

            var response = nuntly.agents().memory().retrieve("aB3dE7fG");
    put:
      summary: Upsert Agent Memory
      description: Create or update the memory for an AI agent.
      operationId: upsert-agent-memory
      tags:
        - Agents
      parameters:
        - name: agentId
          in: path
          required: true
          description: The agent identifier.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMemoryRequest"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AgentMemory"
                required:
                  - data
                additionalProperties: false
        "500":
          description: An error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X PUT 'https://api.nuntly.com/agents/aB3dE7fG/memory' \
              -H 'Authorization: Bearer apk_xxx' \
              -H 'Content-Type: application/json' \
              -d '{"memory":{}}'
        - lang: JavaScript
          source: |-
            import { Nuntly } from '@nuntly/sdk';

            const client = new Nuntly({
              apiKey: process.env['NUNTLY_API_KEY'],
            });

            const response = await client.agents.memory.upsert('aB3dE7fG', {
              memory: {  },
            });
        - lang: Java
          source: |-
            import com.nuntly.sdk.Nuntly;
            import com.nuntly.sdk.ClientOptions;
            import com.nuntly.sdk.models.*;

            var nuntly = Nuntly.create(ClientOptions.builder()
                .apiKey(System.getenv("NUNTLY_API_KEY"))
                .build());

            var response = nuntly.agents().memory().upsert("aB3dE7fG", AgentMemoryRequest.builder()
                .memory(List.of(java.util.Map.of()))
                .build());
  /api-keys:
    post:
      summary: Create Api Key
      description: Generate a new API key. The key value is only returned once. Store it securely.
      operationId: create-api-key
      tags:
        - API Keys
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CreateApiKeyResponse"
                required:
                  - data
                additionalProperties: false
        "500":
          description: An error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X POST 'https://api.nuntly.com/api-keys' \
              -H 'Authorization: Bearer apk_xxx' \
              -H 'Content-Type: application/json' \
              -d '{"name":"Production","permission":"fullAccess"}'
        - lang: JavaScript
          source: |-
            import { Nuntly } from '@nuntly/sdk';

            const client = new Nuntly({
              apiKey: process.env['NUNTLY_API_KEY'],
            });

            const response = await client.apiKeys.create({
              name: 'Production',
              permission: 'fullAccess',
            });
        - lang: Java
          source: |-
            import com.nuntly.sdk.Nuntly;
            import com.nuntly.sdk.ClientOptions;
            import com.nuntly.sdk.models.*;

            var nuntly = Nuntly.create(ClientOptions.builder()
                .apiKey(System.getenv("NUNTLY_API_KEY"))
                .build());

            var response = nuntly.apiKeys().create(CreateApiKeyRequest.builder()
                .name("Production")
                .permission("fullAccess")
                .build());
    get:
      summary: List Api Keys
      description: Returns all API keys for the organization. Key values are never included in list responses.
      operationId: list-api-keys
      tags:
        - API Keys
      parameters:
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKeysResponseItem"
                  nextCursor:
                    type:
                      - string
                      - "null"
                required:
                  - data
                additionalProperties: false
        "500":
          description: An error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codeSamples:
        - lang: cURL
          source: |-
            curl -X GET 'https://api.nuntly.com/api-keys' \
              -H 'Authorization: Bearer apk_xxx'
        - lang: JavaScript
          source: |-
            import { Nuntly } from '@nuntly/sdk';

            const client = new Nuntly({
              apiKey: process.env['NUNTLY_API_KEY'],
            });

            const response = await client.apiKeys.list();
        - lang: Java
          source: |-
            import com.nuntly.sdk.Nuntly;
            import com.nuntly.sdk.ClientOptions;

            var nuntly = Nuntly.create(ClientOptions.builder()
                .apiKey(System.getenv("NUNTLY_API_KEY"))
                .build());

            var response = nuntly.apiKeys().list();
