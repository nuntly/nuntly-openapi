    post:
      summary: Send Email
      description: Send transactional emails through Nuntly platform. It supports HTML and plain-text emails, attachments, labels, custom headers and scheduling.
      operationId: send-email
      tags:
        - Emails
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: Unique key to ensure the request is processed at most once. UUIDv4 recommended.
          schema:
            type: string
            minLength: 1
            maxLength: 255
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmailRequest"
      responses:
        "202":
          description: Request accepted.
          content:
            application/json:
              schema:
                type: object
