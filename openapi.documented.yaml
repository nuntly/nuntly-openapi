components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
      required:
        - message
    AgentMemory:
      type: object
      required:
        - id
        - createdAt
        - agentId
        - inboxId
        - threadId
        - memory
        - summary
      properties:
        id:
          description: The agent memory record id.
          type: string
          examples:
            - em_01ka8k8s80gvx9604cn9am5st4
        createdAt:
          description: Date at which the object was created (ISO 8601 format)
          type: string
          examples:
            - "2026-03-29T12:00:00.000Z"
        updatedAt:
          description: Date at which the object was updated (ISO 8601 format)
          type: string
        agentId:
          description: The agent identifier.
          type: string
        inboxId:
          description: The inbox id.
          type: string
          nullable: true
          examples:
            - ibx_01ka8k8s80gvx9604cn9am5st4
        threadId:
          description: The thread id.
          type: string
          nullable: true
        memory:
          description: The agent memory data.
          type: object
          additionalProperties: true
        summary:
          description: The conversation summary.
          type: string
          nullable: true
    AgentMemoryRequest:
      type: object
      required:
        - memory
      properties:
        inboxId:
          description: The inbox id to scope the memory to.
          type: string
          examples:
            - ibx_01ka8k8s80gvx9604cn9am5st4
        threadId:
          description: The thread id to scope the memory to.
          type: string
        memory:
          description: The agent memory key-value data.
          anyOf:
            - type: array
              items:
                type: string
            - type: string
        summary:
          description: A human-readable conversation summary.
          type: string
          nullable: true
    ApiKeyResponse:
      type: object
      required:
        - id
        - shortToken
        - status
        - createdAt
      properties:
        id:
          description: The id of the api key
          type: string
          examples:
            - em_01ka8k8s80gvx9604cn9am5st4
        name:
          description: The name of the api key
          type: string
          examples:
            - example.com
        shortToken:
          description: The last 6 characters of the api key token
          type: string
        status:
          description: The status for the api key
          type: string
          enum:
            - enabled
            - disabled
            - revoked
        createdAt:
          description: Date at which the object was created (ISO 8601 format)
          type: string
          examples:
            - "2026-03-29T12:00:00.000Z"
