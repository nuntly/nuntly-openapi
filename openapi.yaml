components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    AgentMemory:
      type: object
      required:
        - id
        - createdAt
        - agentId
        - inboxId
        - threadId
        - memory
        - summary
      properties:
        id:
          description: The agent memory record id.
          type: string
        createdAt:
          description: Date at which the object was created (ISO 8601 format)
          type: string
        updatedAt:
          description: Date at which the object was updated (ISO 8601 format)
          type: string
        agentId:
          description: The agent identifier.
          type: string
        inboxId:
          description: The inbox id.
          type: string
          nullable: true
        threadId:
          description: The thread id.
          type: string
          nullable: true
        memory:
          description: The agent memory data.
          type: object
          additionalProperties: true
        summary:
          description: The conversation summary.
          type: string
          nullable: true
    AgentMemoryRequest:
      type: object
      required:
        - memory
      properties:
        inboxId:
          description: The inbox id to scope the memory to.
          type: string
        threadId:
          description: The thread id to scope the memory to.
          type: string
        memory:
          description: The agent memory key-value data.
          type: object
          additionalProperties: true
        summary:
          description: A human-readable conversation summary.
          type: string
          nullable: true
    ApiKeyResponse:
      type: object
      required:
        - id
        - shortToken
        - status
        - createdAt
      properties:
        id:
          description: The id of the api key
          type: string
        name:
          description: The name of the api key
          type: string
        shortToken:
          description: The last 6 characters of the api key token
          type: string
        status:
          description: The status for the api key
          type: string
          enum:
            - enabled
            - disabled
            - revoked
        createdAt:
          description: Date at which the object was created (ISO 8601 format)
          type: string
    ApiKeysResponseItem:
      type: object
      required:
        - id
        - shortToken
        - status
        - createdAt
      properties:
        id:
          description: The id of the api key
          type: string
        name:
          description: The name of the api key
          type: string
        shortToken:
          description: The last 6 characters of the api key token
