name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish OpenAPI spec to GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify spec files are present
        run: |
          test -f openapi.yaml || { echo "::error::openapi.yaml missing"; exit 1; }
          test -f openapi.documented.yaml || { echo "::error::openapi.documented.yaml missing"; exit 1; }

      - name: Create GitHub Release with spec attachments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE=$(mktemp)
          cat > "$NOTES_FILE" <<EOF
          OpenAPI 3.1 specification for the Nuntly REST API \`${VERSION}\`.

          Two files are attached to this release:
          - \`openapi.yaml\`: machine-friendly spec for code generators and clients
          - \`openapi.documented.yaml\`: same spec with inline schema descriptions for API references and documentation tooling

          Documentation: https://nuntly.com/docs
          Get an API key: https://nuntly.com/auth/sign-up
          EOF
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$NOTES_FILE" \
            openapi.yaml \
            openapi.documented.yaml
